<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Legal Doc Summarizer</title>
<style>
  :root {
    --bg: #0e1a15;
    --panel: #12241d;
    --green: #4ec97e;
    --green-dark: #1d3b2c;
    --text: #e8f0ea;
    --muted: #9db5a8;
    --border: #234032;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    color: var(--green);
    font-size: 28px;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    margin-bottom: 30px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .upload-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  input[type="file"] {
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    flex: 1;
    min-width: 200px;
  }

  button {
    background: var(--green);
    color: #05130b;
    border: none;
    border-radius: 6px;
    padding: 12px 24px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    font-size: 14px;
    color: var(--muted);
  }

  .result-section {
    margin-top: 12px;
  }

  .result-section h3 {
    color: var(--green);
    font-size: 16px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .summary-text {
    line-height: 1.6;
    color: var(--text);
  }

  ul {
    margin: 0;
    padding-left: 20px;
  }

  li {
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .clause-item { color: var(--text); }

  .risk-item {
    color: #f2b8a0;
  }

  .risk-item::marker {
    color: #e07850;
  }

  .filename-badge {
    display: inline-block;
    background: var(--green-dark);
    color: var(--green);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .error-box {
    background: #3b1d1d;
    border: 1px solid #6b2f2f;
    color: #f2b8a0;
    padding: 14px;
    border-radius: 6px;
    margin-top: 16px;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>⚖ Legal Document Summarizer</h1>
    <p class="subtitle">Upload a contract (PDF, DOCX, or TXT) to get an AI-generated summary, key clauses, and risk flags.</p>

    <div class="panel">
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />
        <button id="analyzeBtn" onclick="analyzeDocument()">Analyze Document</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div id="resultPanel" class="panel" style="display:none;">
      <span class="filename-badge" id="fileNameBadge"></span>

      <div class="result-section">
        <h3>Summary</h3>
        <p class="summary-text" id="summaryText"></p>
      </div>

      <div class="result-section">
        <h3>Key Clauses</h3>
        <ul id="clausesList"></ul>
      </div>

      <div class="result-section">
        <h3>Risk Flags</h3>
        <ul id="riskList"></ul>
      </div>
    </div>

    <div id="errorPanel" class="error-box" style="display:none;"></div>
  </div>

<script>
async function analyzeDocument() {
  const fileInput = document.getElementById('fileInput');
  const statusEl = document.getElementById('status');
  const resultPanel = document.getElementById('resultPanel');
  const errorPanel = document.getElementById('errorPanel');
  const btn = document.getElementById('analyzeBtn');

  resultPanel.style.display = 'none';
  errorPanel.style.display = 'none';

  if (!fileInput.files.length) {
    statusEl.textContent = 'Please choose a file first.';
    return;
  }

  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append('file', file);

  btn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span> Analyzing document, please wait...';

  try {
    const response = await fetch('/api/documents/analyze', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText || `Request failed with status ${response.status}`);
    }

    const data = await response.json();

    document.getElementById('fileNameBadge').textContent = data.fileName;
    document.getElementById('summaryText').textContent = data.summary;

    const clausesList = document.getElementById('clausesList');
    clausesList.innerHTML = '';
    (data.keyClauses || []).forEach(c => {
      const li = document.createElement('li');
      li.className = 'clause-item';
      li.textContent = c;
      clausesList.appendChild(li);
    });

    const riskList = document.getElementById('riskList');
    riskList.innerHTML = '';
    (data.riskFlags || []).forEach(r => {
      const li = document.createElement('li');
      li.className = 'risk-item';
      li.textContent = r;
      riskList.appendChild(li);
    });

    resultPanel.style.display = 'block';
    statusEl.textContent = '';
  } catch (err) {
    errorPanel.textContent = 'Error: ' + err.message;
    errorPanel.style.display = 'block';
    statusEl.textContent = '';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
